<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Number Guessing Game</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>

<div class="container">
    <div class="game-card">
        <h1>Number Guessing Game</h1>
        <p class="subtitle">Can you guess the secret number?</p>

        <div class="message-box" th:classappend="${status}">
            <p th:text="${message}"></p>
        </div>

        <form action="/guess" method="post" class="guess-form">
            <input
                    type="number"
                    name="userGuess"
                    min="1"
                    max="100"
                    placeholder="Enter your guess"
                    required
            >
            <button type="submit">Guess</button>
        </form>

        <p class="attempts">
            Attempts: <span th:text="${attempts}">0</span>
        </p>

        <form action="/reset" method="post">
            <button type="submit" class="reset-btn">Restart Game</button>
        </form>
    </div>
</div>
<h2>Score History</h2>

<table class="history-table">
    <tr>
        <th>ID</th>
        <th>Secret Number</th>
        <th>Attempts</th>
        <th>Result</th>
        <th>Played At</th>
    </tr>

    <tr th:each="game : ${history}">
        <td th:text="${game.id}"></td>
        <td th:text="${game.secretNumber}"></td>
        <td th:text="${game.attempts}"></td>
        <td th:text="${game.result}"></td>
        <td th:text="${game.playedAt}"></td>
    </tr>
</table>

</body>
</html>
